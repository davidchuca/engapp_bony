<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字智慧測驗系統 v3</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ec4b6;
            --danger: #e71d36;
            --background: #f8f9fa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--background);
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1, h2 { text-align: center; color: #2c3e50; }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        .panel { display: none; }
        .panel.active { display: block; }
        
        /* 篩選區 */
        .filter-section {
            background: #edf2f7;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 10px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        /* 單字清單樣式 */
        .word-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .word-table th, .word-table td {
            border-bottom: 1px solid #e2e8f0;
            padding: 12px;
            text-align: left;
        }
        .word-table th { background: #f1f5f9; }
        .btn-audio {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }

        /* 測試區分頁樣式 */
        .quiz-container {
            text-align: center;
            padding: 20px 10px;
        }
        .quiz-box {
            text-align: center;
            padding: 30px 10px;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            min-height: 220px;
            background: #fff;
            margin-bottom: 20px;
        }
        .quiz-progress {
            font-size: 16px;
            color: #64748b;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .question {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #1e293b;
        }
        .input-answer {
            font-size: 20px;
            padding: 10px;
            width: 80%;
            max-width: 300px;
            text-align: center;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-width: 500px;
            margin: 0 auto 20px;
        }
        .option-btn {
            padding: 15px;
            font-size: 18px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-btn:hover:not(:disabled) { background: #f1f5f9; border-color: #cbd5e1; }
        
        /* 導覽按鈕控制區 */
        .nav-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .btn-nav {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #64748b;
            color: white;
            font-weight: bold;
        }
        .btn-nav:disabled { background: #cbd5e1; cursor: not-allowed; }
        .btn-submit { background: var(--primary); color: white; padding: 10px 25px; font-size: 18px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-finish { background: #059669; color: white; }
        
        .feedback { font-size: 18px; font-weight: bold; margin-top: 12px; min-height: 25px; }
        .feedback.correct { color: var(--success); }
        .feedback.wrong { color: var(--danger); }
        .stats-info { font-size: 13px; color: #94a3b8; margin-top: 5px; }
        
        /* 結算報告樣式 */
        .report-box {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: left;
        }
        .report-item {
            padding: 8px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 英文單字智慧複習系統 v3</h1>
    
    <div class="tabs">
        <button class="tab-btn active" id="btn-list-tab" onclick="switchTab('list-tab')">課文單字瀏覽</button>
        <button class="tab-btn" id="btn-quiz1-tab" onclick="switchTab('quiz1-tab')">中翻英填空測試</button>
        <button class="tab-btn" id="btn-quiz2-tab" onclick="switchTab('quiz2-tab')">英翻中選擇測試</button>
    </div>

    <div class="filter-section" id="global-filter">
        <strong>選擇範圍（可多選）：</strong>
        <div id="lesson-filters" class="checkbox-group">載入資料中...</div>
    </div>

    <hr>

    <div id="list-tab" class="panel active">
        <h2>單字清單</h2>
        <table class="word-table">
            <thead>
                <tr>
                    <th>課別/單元</th>
                    <th>英文單字</th>
                    <th>發音</th>
                    <th>中文解釋</th>
                    <th>目前錯題權重</th>
                </tr>
            </thead>
            <tbody id="word-list-body">
                <tr><td colspan="5" style="text-align:center;">請先勾選上方單元範圍</td></tr>
            </tbody>
        </table>
    </div>

    <div id="quiz1-tab" class="panel">
        <h2>模式 1：中翻英填空 (10題挑戰賽)</h2>
        <div class="quiz-container">
            <div id="q1-start-screen">
                <button class="btn-submit" onclick="startSession(1)">開始 10 題測試</button>
            </div>
            
            <div id="q1-play-screen" style="display:none;">
                <div class="quiz-progress" id="q1-progress">第 1 / 10 題</div>
                <div class="quiz-box">
                    <div id="q1-question" class="question">題目</div>
                    <input type="text" id="q1-input" class="input-answer" placeholder="請輸入英文單字" autocomplete="off" onkeyup="if(event.key==='Enter')saveAnswer1()"><br>
                    <div id="q1-feedback" class="feedback"></div>
                    <div id="q1-stats" class="stats-info"></div>
                </div>
                <div class="nav-controls">
                    <button class="btn-nav" id="q1-prev" onclick="prevQuestion(1)">← 上一題</button>
                    <button class="btn-submit" id="q1-save" onclick="saveAnswer1()">確認本題答案</button>
                    <button class="btn-nav" id="q1-next" onclick="nextQuestion(1)">下一題 →</button>
                    <button class="btn-nav btn-finish" id="q1-finish" onclick="finishSession(1)" style="display:none;">完成測試 (交卷)</button>
                </div>
            </div>

            <div id="q1-result-screen" style="display:none;"></div>
        </div>
    </div>

    <div id="quiz2-tab" class="panel">
        <h2>模式 2：英翻中選擇 (10題挑戰賽)</h2>
        <div class="quiz-container">
            <div id="q2-start-screen">
                <button class="btn-submit" onclick="startSession(2)">開始 10 題測試</button>
            </div>
            
            <div id="q2-play-screen" style="display:none;">
                <div class="quiz-progress" id="q2-progress">第 1 / 10 題</div>
                <div class="quiz-box">
                    <div id="q2-question" class="question">題目</div>
                    <div id="q2-options" class="options-grid"></div>
                    <div id="q2-feedback" class="feedback"></div>
                    <div id="q2-stats" class="stats-info"></div>
                </div>
                <div class="nav-controls">
                    <button class="btn-nav" id="q2-prev" onclick="prevQuestion(2)">← 上一題</button>
                    <button class="btn-nav" id="q2-next" onclick="nextQuestion(2)">下一題 →</button>
                    <button class="btn-nav btn-finish" id="q2-finish" onclick="finishSession(2)" style="display:none;">完成測試 (交卷)</button>
                </div>
            </div>

            <div id="q2-result-screen" style="display:none;"></div>
        </div>
    </div>
</div>

<script>
    // 全域變數
    let allWords = [];       
    let activePool = [];     
    const WEIGHT_KEY = "word_weights_v3";
    let wordWeights = JSON.parse(localStorage.getItem(WEIGHT_KEY)) || {};

    let currentSession = {
        mode: 1,           
        questions: [],     
        userAnswers: [],   
        optionsData: [],   
        currentIndex: 0
    };

    window.addEventListener('DOMContentLoaded', () => {
        // 使用 PapaParse 線上直接讀取並解析 CSV 檔案
        Papa.parse('words.csv', {
            download: true,
            header: true, // 自動將第一行轉為物件的 Key
            skipEmptyLines: true, // 自動跳過空白行
            complete: function(results) {
                processParsedData(results.data);
            },
            error: function(err) {
                alert('讀取 CSV 失敗: ' + err + '\n請確認 words.csv 與網頁在同資料夾且檔名全小寫。');
            }
        });
    });

    // 處理解析後的安全資料
    function processParsedData(data) {
        allWords = [];
        
        data.forEach(row => {
            // 抓取欄位（欄位名稱自動轉為小寫做比對，避免大小寫不合）
            const keys = Object.keys(row);
            const keyLesson = keys.find(k => k.toLowerCase() === 'lesson');
            const keyTitle = keys.find(k => k.toLowerCase() === 'title');
            const keyWord = keys.find(k => k.toLowerCase() === 'word');
            const keyTrans = keys.find(k => k.toLowerCase() === 'translation');

            const lessonText = row[keyLesson] ? row[keyLesson].trim() : '';
            const titleText = row[keyTitle] ? row[keyTitle].trim() : '';
            const wordText = row[keyWord] ? row[keyWord].trim() : '';
            const transText = row[keyTrans] ? row[keyTrans].trim() : '';

            if (wordText && transText) {
                allWords.push({
                    lesson: lessonText,
                    title: titleText,
                    word: wordText,
                    translation: transText,
                    id: `${lessonText}_${wordText}`
                });
            }
        });

        if (allWords.length === 0) {
            alert("警告：未能在 CSV 中解析出任何有效單字，請檢查欄位表頭是否包含 lesson, title, word, translation");
            return;
        }

        initWeights();
        renderFilters();
        updateActivePool();
    }

    function initWeights() {
        allWords.forEach(w => {
            if (wordWeights[w.id] === undefined) wordWeights[w.id] = 10;
        });
        saveWeights();
    }

    function saveWeights() {
        localStorage.setItem(WEIGHT_KEY, JSON.stringify(wordWeights));
    }

    function renderFilters() {
        const lessons = [];
        const seen = new Set();
        allWords.forEach(w => {
            const key = `${w.lesson}-${w.title}`;
            if (!seen.has(key)) {
                seen.add(key);
                lessons.push({ id: w.lesson, title: w.title });
            }
        });

        // 排序單元
        lessons.sort((a, b) => {
            const numA = parseInt(a.id) || 0;
            const numB = parseInt(b.id) || 0;
            return numA - numB;
        });

        const container = document.getElementById('lesson-filters');
        container.innerHTML = '';
        lessons.forEach((l, idx) => {
            const label = document.createElement('label');
            label.className = 'checkbox-label';
            const checked = idx === 0 ? 'checked' : ''; // 預設勾選第 1 個單元
            label.innerHTML = `<input type="checkbox" value="${l.id}" ${checked} onchange="updateActivePool()"> L${l.id} (${l.title})`;
            container.appendChild(label);
        });
    }

    function updateActivePool() {
        const checkedLessons = Array.from(document.querySelectorAll('#lesson-filters input:checked')).map(el => el.value);
        activePool = allWords.filter(w => checkedLessons.includes(w.lesson));
        renderWordList();
        
        // 重置畫面
        document.getElementById('q1-start-screen').style.display = 'block';
        document.getElementById('q1-play-screen').style.display = 'none';
        document.getElementById('q1-result-screen').style.display = 'none';
        document.getElementById('q2-start-screen').style.display = 'block';
        document.getElementById('q2-play-screen').style.display = 'none';
        document.getElementById('q2-result-screen').style.display = 'none';
    }

    function renderWordList() {
        const tbody = document.getElementById('word-list-body');
        if (activePool.length === 0) {
            tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;color:red;">請至少勾選一個單元範圍</td></tr>';
            return;
        }
        tbody.innerHTML = activePool.map(w => `
            <tr>
                <td>L${w.lesson} - ${w.title}</td>
                <td style="font-weight:bold; font-size:18px;">${w.word}</td>
                <td><button class="btn-audio" onclick="speak('${w.word}')">🔊</button></td>
                <td>${w.translation}</td>
                <td><span style="color:#e71d36; font-weight:bold;">${wordWeights[w.id]}</span> 籤</td>
            </tr>
        `).join('');
    }

    function speak(text) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US';
            utterance.rate = 0.9;
            window.speechSynthesis.speak(utterance);
        }
    }

    function getRandomWordByWeight() {
        if (activePool.length === 0) return null;
        let totalWeight = 0;
        activePool.forEach(w => { totalWeight += (wordWeights[w.id] || 10); });
        let randomNum = Math.random() * totalWeight;
        for (let i = 0; i < activePool.length; i++) {
            const w = activePool[i];
            const weight = wordWeights[w.id] || 10;
            if (randomNum < weight) return w;
            randomNum -= weight;
        }
        return activePool[activePool.length - 1];
    }

    function startSession(mode) {
        if (activePool.length === 0) {
            alert("請先在上方勾選要測試的單元範圍！");
            return;
        }
        
        currentSession.mode = mode;
        currentSession.currentIndex = 0;
        currentSession.questions = [];
        currentSession.userAnswers = new Array(10).fill(""); 
        currentSession.optionsData = [];

        for (let i = 0; i < 10; i++) {
            let picked = getRandomWordByWeight();
            currentSession.questions.push(picked);
            
            if (mode === 2) {
                let opts = [picked.translation];
                let wrongPool = allWords.filter(w => w.translation !== picked.translation).map(w => w.translation);
                wrongPool = [...new Set(wrongPool)].sort(() => Math.random() - 0.5);
                for(let j=0; j<3; j++) { if(wrongPool[j]) opts.push(wrongPool[j]); }
                opts.sort(() => Math.random() - 0.5);
                currentSession.optionsData.push(opts);
            }
        }

        document.getElementById(`q${mode}-start-screen`).style.display = 'none';
        document.getElementById(`q${mode}-result-screen`).style.display = 'none';
        document.getElementById(`q${mode}-play-screen`).style.display = 'block';

        showQuestion(mode);
    }

    function showQuestion(mode) {
        const idx = currentSession.currentIndex;
        const wordObj = currentSession.questions[idx];
        
        document.getElementById(`q${mode}-progress`).innerText = `第 ${idx + 1} / 10 題`;
        document.getElementById(`q${mode}-stats`).innerText = `目前此字權重：${wordWeights[wordObj.id]} 籤`;

        document.getElementById(`q${mode}-prev`).disabled = (idx === 0);
        if (idx === 9) {
            document.getElementById(`q${mode}-next`).style.display = 'none';
            document.getElementById(`q${mode}-finish'].style.display = 'inline-block';
            // 修正筆誤
            const finishBtn = document.getElementById(`q${mode}-finish`);
            if(finishBtn) finishBtn.style.display = 'inline-block';
        } else {
            document.getElementById(`q${mode}-next`).style.display = 'inline-block';
            const finishBtn = document.getElementById(`q${mode}-finish`);
            if(finishBtn) finishBtn.style.display = 'none';
        }

        if (mode === 1) {
            document.getElementById('q1-question').innerText = `請寫出英文：「 ${wordObj.translation} 」`;
            const inputField = document.getElementById('q1-input');
            inputField.value = currentSession.userAnswers[idx]; 
            document.getElementById('q1-feedback').innerText = currentSession.userAnswers[idx] ? "💡 本題已暫存答案" : "";
            document.getElementById('q1-feedback').className = "feedback";
            inputField.focus();
        } else {
            document.getElementById('q2-question').innerText = wordObj.word;
            speak(wordObj.word); 
            
            const options = currentSession.optionsData[idx];
            const savedAns = currentSession.userAnswers[idx];
            const optionsContainer = document.getElementById('q2-options');
            
            optionsContainer.innerHTML = options.map(opt => {
                let activeClass = "";
                if (savedAns === opt) {
                    activeClass = "background-color: var(--primary); color: white; border-color: var(--primary);";
                }
                return `<button class="option-btn" style="${activeClass}" onclick="saveAnswer2('${opt}', this)">${opt}</button>`;
            }).join('');
            document.getElementById('q2-feedback').innerText = savedAns ? "💡 本題已選擇答案" : "";
            document.getElementById('q2-feedback').className = "feedback";
        }
    }

    function saveAnswer1() {
        const idx = currentSession.currentIndex;
        const val = document.getElementById('q1-input').value.trim();
        currentSession.userAnswers[idx] = val;
        
        document.getElementById('q1-feedback').className = "feedback correct";
        document.getElementById('q1-feedback').innerText = "已暫存答案！";

        if (idx < 9) {
            setTimeout(() => { nextQuestion(1); }, 400);
        }
    }

    function saveAnswer2(selectedOpt, btnElement) {
        const idx = currentSession.currentIndex;
        currentSession.userAnswers[idx] = selectedOpt;

        const buttons = document.querySelectorAll('#q2-options .option-btn');
        buttons.forEach(btn => btn.setAttribute('style', ''));
        btnElement.style.backgroundColor = "var(--primary)";
        btnElement.style.color = "white";

        document.getElementById('q2-feedback').className = "feedback correct";
        document.getElementById('q2-feedback').innerText = "已選取！";

        if (idx < 9) {
            setTimeout(() => { nextQuestion(2); }, 400);
        }
    }

    function nextQuestion(mode) {
        if (currentSession.currentIndex < 9) {
            if(mode === 1) {
                currentSession.userAnswers[currentSession.currentIndex] = document.getElementById('q1-input').value.trim();
            }
            currentSession.currentIndex++;
            showQuestion(mode);
        }
    }

    function prevQuestion(mode) {
        if (currentSession.currentIndex > 0) {
            if(mode === 1) {
                currentSession.userAnswers[currentSession.currentIndex] = document.getElementById('q1-input').value.trim();
            }
            currentSession.currentIndex--;
            showQuestion(mode);
        }
    }

    function finishSession(mode) {
        if(mode === 1) {
            currentSession.userAnswers[currentSession.currentIndex] = document.getElementById('q1-input').value.trim();
        }

        let correctCount = 0;
        let reportHtml = `<h2>🎯 測試結果報告</h2>`;
        reportHtml += `<p style="font-size:18px; text-align:center;">您在 10 題中答對了 <strong style="color:var(--success); font-size:24px;">{{SCORE}}</strong> 題！</p>`;
        reportHtml += `<div class="report-box">`;

        currentSession.questions.forEach((wordObj, i) => {
            const userAns = currentSession.userAnswers[i].toLowerCase();
            let isCorrect = false;
            let displayUserAns = currentSession.userAnswers[i] || "(未作答)";

            if (mode === 1) {
                isCorrect = (userAns === wordObj.word.toLowerCase());
            } else {

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字智慧測驗系統 v2</title>
    <style>
        :root {
            --primary: #4a90e2;
            --success: #2ec4b6;
            --danger: #e71d36;
            --background: #f8f9fa;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background-color: var(--background);
            color: #333;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        h1, h2 { text-align: center; color: #2c3e50; }
        .tabs {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
        }
        .tab-btn {
            padding: 10px 20px;
            border: none;
            background: #e2e8f0;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: var(--primary);
            color: white;
        }
        .panel { display: none; }
        .panel.active { display: block; }
        
        /* 篩選區 */
        .filter-section {
            background: #edf2f7;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .checkbox-group {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 10px;
        }
        .checkbox-label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
        }

        /* 單字清單樣式 */
        .word-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
        }
        .word-table th, .word-table td {
            border-bottom: 1px solid #e2e8f0;
            padding: 12px;
            text-align: left;
        }
        .word-table th { background: #f1f5f9; }
        .btn-audio {
            background: none;
            border: none;
            font-size: 18px;
            cursor: pointer;
        }

        /* 測試區分頁樣式 */
        .quiz-container {
            text-align: center;
            padding: 20px 10px;
        }
        .quiz-box {
            text-align: center;
            padding: 30px 10px;
            border: 2px dashed #cbd5e1;
            border-radius: 8px;
            min-height: 220px;
            background: #fff;
            margin-bottom: 20px;
        }
        .quiz-progress {
            font-size: 16px;
            color: #64748b;
            margin-bottom: 15px;
            font-weight: bold;
        }
        .question {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 20px;
            color: #1e293b;
        }
        .input-answer {
            font-size: 20px;
            padding: 10px;
            width: 80%;
            max-width: 300px;
            text-align: center;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            margin-bottom: 15px;
        }
        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            max-width: 500px;
            margin: 0 auto 20px;
        }
        .option-btn {
            padding: 15px;
            font-size: 18px;
            border: 2px solid #e2e8f0;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .option-btn:hover:not(:disabled) { background: #f1f5f9; border-color: #cbd5e1; }
        .option-btn.selected-correct { background: var(--success) !important; color: white; }
        .option-btn.selected-wrong { background: var(--danger) !important; color: white; }
        
        /* 導覽按鈕控制區 */
        .nav-controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin-top: 20px;
        }
        .btn-nav {
            padding: 10px 20px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            background: #64748b;
            color: white;
            font-weight: bold;
        }
        .btn-nav:disabled { background: #cbd5e1; cursor: not-allowed; }
        .btn-submit { background: var(--primary); color: white; padding: 10px 25px; font-size: 18px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-finish { background: #059669; color: white; }
        
        .feedback { font-size: 18px; font-weight: bold; margin-top: 12px; min-height: 25px; }
        .feedback.correct { color: var(--success); }
        .feedback.wrong { color: var(--danger); }
        .stats-info { font-size: 13px; color: #94a3b8; margin-top: 5px; }
        
        /* 結算報告樣式 */
        .report-box {
            background: #f1f5f9;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            text-align: left;
        }
        .report-item {
            padding: 8px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            justify-content: space-between;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 英文單字智慧複習系統 v2</h1>
    
    <div class="tabs">
        <button class="tab-btn active" id="btn-list-tab" onclick="switchTab('list-tab')">課文單字瀏覽</button>
        <button class="tab-btn" id="btn-quiz1-tab" onclick="switchTab('quiz1-tab')">中翻英填空測試</button>
        <button class="tab-btn" id="btn-quiz2-tab" onclick="switchTab('quiz2-tab')">英翻中選擇測試</button>
    </div>

    <div class="filter-section" id="global-filter">
        <strong>選擇範圍（可多選）：</strong>
        <div id="lesson-filters" class="checkbox-group">載入資料中...</div>
    </div>

    <hr>

    <div id="list-tab" class="panel active">
        <h2>單字清單</h2>
        <table class="word-table">
            <thead>
                <tr>
                    <th>課別/單元</th>
                    <th>英文單字</th>
                    <th>發音</th>
                    <th>中文解釋</th>
                    <th>目前錯題權重</th>
                </tr>
            </thead>
            <tbody id="word-list-body">
                <tr><td colspan="5" style="text-align:center;">請先勾選上方單元範圍</td></tr>
            </tbody>
        </table>
    </div>

    <div id="quiz1-tab" class="panel">
        <h2>模式 1：中翻英填空 (10題挑戰賽)</h2>
        <div class="quiz-container">
            <div id="q1-start-screen">
                <button class="btn-submit" onclick="startSession(1)">開始 10 題測試</button>
            </div>
            
            <div id="q1-play-screen" style="display:none;">
                <div class="quiz-progress" id="q1-progress">第 1 / 10 題</div>
                <div class="quiz-box">
                    <div id="q1-question" class="question">題目</div>
                    <input type="text" id="q1-input" class="input-answer" placeholder="請輸入英文單字" autocomplete="off" onkeyup="if(event.key==='Enter')saveAnswer1()"><br>
                    <div id="q1-feedback" class="feedback"></div>
                    <div id="q1-stats" class="stats-info"></div>
                </div>
                <div class="nav-controls">
                    <button class="btn-nav" id="q1-prev" onclick="prevQuestion(1)">← 上一題</button>
                    <button class="btn-submit" id="q1-save" onclick="saveAnswer1()">確認本題答案</button>
                    <button class="btn-nav" id="q1-next" onclick="nextQuestion(1)">下一題 →</button>
                    <button class="btn-nav btn-finish" id="q1-finish" onclick="finishSession(1)" style="display:none;">完成測試 (交卷)</button>
                </div>
            </div>

            <div id="q1-result-screen" style="display:none;"></div>
        </div>
    </div>

    <div id="quiz2-tab" class="panel">
        <h2>模式 2：英翻中選擇 (10題挑戰賽)</h2>
        <div class="quiz-container">
            <div id="q2-start-screen">
                <button class="btn-submit" onclick="startSession(2)">開始 10 題測試</button>
            </div>
            
            <div id="q2-play-screen" style="display:none;">
                <div class="quiz-progress" id="q2-progress">第 1 / 10 題</div>
                <div class="quiz-box">
                    <div id="q2-question" class="question">題目</div>
                    <div id="q2-options" class="options-grid"></div>
                    <div id="q2-feedback" class="feedback"></div>
                    <div id="q2-stats" class="stats-info"></div>
                </div>
                <div class="nav-controls">
                    <button class="btn-nav" id="q2-prev" onclick="prevQuestion(2)">← 上一題</button>
                    <button class="btn-nav" id="q2-next" onclick="nextQuestion(2)">下一題 →</button>
                    <button class="btn-nav btn-finish" id="q2-finish" onclick="finishSession(2)" style="display:none;">完成測試 (交卷)</button>
                </div>
            </div>

            <div id="q2-result-screen" style="display:none;"></div>
        </div>
    </div>
</div>

<script>
    // 全域變數
    let allWords = [];       
    let activePool = [];     
    const WEIGHT_KEY = "word_weights_v2";
    let wordWeights = JSON.parse(localStorage.getItem(WEIGHT_KEY)) || {};

    // 測驗階段狀態控制
    let currentSession = {
        mode: 1,           // 1: 填空, 2: 選擇
        questions: [],     // 當前抽出的 10 個單字物件
        userAnswers: [],   // 使用者填寫或選擇的答案紀錄
        optionsData: [],   // 僅模式2用：紀錄每一題固定好的四個選項洗牌結果
        currentIndex: 0
    };

    window.addEventListener('DOMContentLoaded', () => {
        fetch('words.csv')
            .then(response => {
                if (!response.ok) throw new Error('找不到 words.csv');
                return response.text();
            })
            .then(text => {
                allWords = parseCSV(text);
                initWeights();
                renderFilters();
                updateActivePool();
            })
            .catch(err => {
                alert('讀取錯誤: ' + err.message + '\n請確認 words.csv 與網

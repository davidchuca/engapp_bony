<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>英文單字智慧測驗系統 - 擴充版</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        :root { --primary: #4a90e2; --success: #2ec4b6; --danger: #e71d36; --background: #f8f9fa; --warning: #f59e0b; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background-color: var(--background); color: #333; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; }
        h1, h2 { text-align: center; color: #2c3e50; }
        .tabs { display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .tab-btn { padding: 10px 20px; border: none; background: #e2e8f0; border-radius: 6px; cursor: pointer; font-size: 16px; font-weight: bold; transition: all 0.2s; }
        .tab-btn.active { background: var(--primary); color: white; }
        .panel { display: none; }
        .panel.active { display: block; }
        .filter-section { background: #edf2f7; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
        .checkbox-group { display: flex; flex-wrap: wrap; gap: 15px; margin-top: 10px; }
        .checkbox-label { display: flex; align-items: center; gap: 5px; cursor: pointer; }
        .word-table { width: 100%; border-collapse: collapse; margin-top: 15px; }
        .word-table th, .word-table td { border-bottom: 1px solid #e2e8f0; padding: 12px; text-align: left; }
        .word-table th { background: #f1f5f9; }
        .btn-audio { background: none; border: none; font-size: 18px; cursor: pointer; margin-right: 5px; transition: transform 0.1s; }
        .btn-audio:hover { transform: scale(1.2); }
        .quiz-container { text-align: center; padding: 20px 10px; }
        .quiz-box { text-align: center; padding: 30px 10px; border: 2px dashed #cbd5e1; border-radius: 8px; min-height: 220px; background: #fff; margin-bottom: 20px; }
        .quiz-progress { font-size: 16px; color: #64748b; margin-bottom: 15px; font-weight: bold; }
        .question { font-size: 32px; font-weight: bold; margin-bottom: 20px; color: #1e293b; }
        .input-answer { font-size: 20px; padding: 10px; width: 80%; max-width: 300px; text-align: center; border: 2px solid #cbd5e1; border-radius: 6px; margin-bottom: 15px; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; max-width: 500px; margin: 0 auto 20px; }
        .option-btn { padding: 15px; font-size: 18px; border: 2px solid #e2e8f0; background: white; border-radius: 8px; cursor: pointer; transition: all 0.2s; }
        .option-btn:hover:not(:disabled) { background: #f1f5f9; border-color: #cbd5e1; }
        .nav-controls { display: flex; justify-content: center; gap: 15px; margin-top: 20px; }
        .btn-nav { padding: 10px 20px; font-size: 16px; border: none; border-radius: 6px; cursor: pointer; background: #64748b; color: white; font-weight: bold; }
        .btn-nav:disabled { background: #cbd5e1; cursor: not-allowed; }
        .btn-submit { background: var(--primary); color: white; padding: 10px 25px; font-size: 18px; border: none; border-radius: 6px; cursor: pointer; }
        .btn-finish { background: #059669; color: white; }
        .feedback { font-size: 18px; font-weight: bold; margin-top: 12px; min-height: 25px; }
        .feedback.correct { color: var(--success); }
        .feedback.wrong { color: var(--danger); }
        .stats-info { font-size: 13px; color: #94a3b8; margin-top: 5px; }
        .report-box { background: #f1f5f9; padding: 20px; border-radius: 8px; margin-top: 20px; text-align: left; }
        .report-item { padding: 8px; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; }
        .history-session { background: #fff; border: 1px solid #e2e8f0; padding: 15px; margin-bottom: 15px; border-radius: 8px; }
        .history-header { font-weight: bold; margin-bottom: 10px; border-bottom: 1px dashed #cbd5e1; padding-bottom: 5px; }
        .history-detail { display: inline-block; width: 48%; margin-bottom: 5px; font-size: 14px; }
        
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 500px; max-height: 80vh; overflow-y: auto; position: relative; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .close-btn { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 20px; cursor: pointer; color: #64748b; }
        .close-btn:hover { color: #e71d36; }
        .word-history-list { list-style: none; padding: 0; margin: 15px 0; }
        .word-history-item { padding: 10px 0; border-bottom: 1px solid #e2e8f0; font-size: 15px; }
        
        .eval-badge { padding: 4px 8px; border-radius: 4px; font-size: 14px; font-weight: bold; color: white; display: inline-block; text-align: center; min-width: 50px; }
    </style>
</head>
<body>

<div class="container">
    <h1>📚 英文單字智慧測驗系統</h1>
    
    <div class="tabs">
        <button class="tab-btn active" id="btn-list-tab" onclick="switchTab('list-tab')">課文單字瀏覽</button>
        <button class="tab-btn" id="btn-quiz1-tab" onclick="switchTab('quiz1-tab')">中翻英填空測試</button>
        <button class="tab-btn" id="btn-quiz2-tab" onclick="switchTab('quiz2-tab')">英翻中選擇測試</button>
    </div>

    <div class="filter-section" id="global-filter">
        <strong>選擇範圍（可多選）：</strong>
        <div id="lesson-filters" class="checkbox-group" style="font-weight:bold; color:#4a90e2;">⏳ 正在讀取 words.csv 並分析資料中...</div>
    </div>

    <hr>

    <div id="list-tab" class="panel active">
        <h2>單字清單</h2>
        <table class="word-table">
            <thead>
                <tr>
                    <th>課別/單元</th>
                    <th>英文單字</th>
                    <th>發音</th> 
                    <th>中文解釋</th>
                    <th>熟練度</th>
                    <th>個別紀錄</th>
                </tr>
            </thead>
            <tbody id="word-list-body">
                <tr><td colspan="6" style="text-align:center;">請先勾選上方單元範圍</td></tr>
            </tbody>
        </table>
    </div>

    <div id="quiz1-tab" class="panel">
        <h2>模式 1：中翻英填空 (10題挑戰賽)</h2>
        
        <div style="text-align: right; margin-bottom: 15px;">
            <button class="btn-nav" onclick="toggleHistory1()" style="background: #3b82f6;">📊 觀看全卷測試紀錄</button>
            <button class="btn-nav" onclick="clearHistory1()" style="background: #ef4444;">🗑️ 重置全卷紀錄</button>
        </div>
        
        <div id="q1-history-screen" style="display:none; background: #f8fafc; padding: 15px; border-radius: 8px; border: 1px solid #cbd5e1; margin-bottom: 20px; text-align: left;">
            <h3 style="margin-top: 0; color: #1e293b;">📈 中翻英測試歷史紀錄 (保留最新100次)</h3>
            <div id="q1-history-content" style="max-height: 400px; overflow-y: auto;"></div>
        </div>

        <div class="quiz-container">
            <div id="q1-start-screen"><button class="btn-submit" onclick="startSession(1)" id="q1-start-btn" disabled>資料載入中</button></div>
            <div id="q1-play-screen" style="display:none;">
                <div class="quiz-progress" id="q1-progress">第 1 / 10 題</div>
                <div class="quiz-box">
                    <div id="q1-question" class="question">題目</div>
                    <input type="text" id="q1-input" class="input-answer" placeholder="請輸入英文單字" autocomplete="off" onkeyup="if(event.key==='Enter')saveAnswer1()"><br>
                    <div id="q1-feedback" class="feedback"></div>
                    <div id="q1-stats" class="stats-info"></div>
                </div>
                <div class="nav-controls">
                    <button class="btn-nav" id="q1-prev" onclick="prevQuestion(1)">← 上一題</button>
                    <button class="btn-submit" id="q1-save" onclick="saveAnswer1()">確認本題答案</button>
                    <button class="btn-nav" id="q1-next" onclick="nextQuestion(1)">下一題 →</button>
                    <button class="btn-nav btn-finish" id="q1-finish" onclick="finishSession(1)" style="display:none;">完成測試 (交卷)</button>
                </div>
            </div>
            <div id="q1-result-screen" style="display:none;"></div>
        </div>
    </div>

    <div id="quiz2-tab" class="panel">
        <h2>模式 2：英翻中選擇 (10題挑戰賽)</h2>
        <div class="quiz-container">
            <div id="q2-start-screen"><button class="btn-submit" onclick="startSession(2)" id="q2-start-btn" disabled>資料載入中</button></div>
            <div id="q2-play-screen" style="display:none;">
                <div class="quiz-progress" id="q2-progress">第 1 / 10 題</div>
                <div class="quiz-box">
                    <div id="q2-question" class="question">題目</div>
                    <div id="q2-options" class="options-grid"></div>
                    <div id="q2-feedback" class="feedback"></div>
                    <div id="q2-stats" class="stats-info"></div>
                </div>
                <div class="nav-controls">
                    <button class="btn-nav" id="q2-prev" onclick="prevQuestion(2)">← 上一題</button>
                    <button class="btn-nav" id="q2-next" onclick="nextQuestion(2)">下一題 →</button>
                    <button class="btn-nav btn-finish" id="q2-finish" onclick="finishSession(2)" style="display:none;">完成測試 (交卷)</button>
                </div>
            </div>
            <div id="q2-result-screen" style="display:none;"></div>
        </div>
    </div>
</div>

<div id="word-history-modal" class="modal-overlay">
    <div class="modal-content">
        <button class="close-btn" onclick="closeWordHistoryModal()">✖</button>
        <h2 id="modal-word-title" style="margin-top: 0; color: var(--primary);">單字紀錄</h2>
        <div id="modal-word-translation" style="color: #64748b; font-size: 16px; margin-bottom: 10px; text-align: center;"></div>
        
        <div id="modal-word-evaluation" style="text-align: center; margin-bottom: 15px; padding: 10px; background: #f1f5f9; border-radius: 8px;"></div>
        
        <div style="max-height: 300px; overflow-y: auto;">
            <ul id="modal-word-list" class="word-history-list"></ul>
        </div>
        
        <button id="modal-word-reset-btn" class="btn-submit" style="background: var(--danger); width: 100%; margin-top: 15px;">🗑️ 清空此單字的測試紀錄</button>
    </div>
</div>

<script>
    const WEIGHT_KEY = "word_weights_final";
    const HISTORY_KEY = "quiz1_history"; 
    const WORD_SPECIFIC_HISTORY_KEY = "word_specific_history"; 

    let wordWeights = {};
    let quiz1History = []; 
    let wordSpecificHistory = {}; 

    let allWords = [];       
    let activePool = [];     
    let currentSession = { mode: 1, questions: [], userAnswers: [], optionsData: [], currentIndex: 0 };

    window.addEventListener('DOMContentLoaded', async () => {
        const filterArea = document.getElementById('lesson-filters');

        try {
            wordWeights = JSON.parse(localStorage.getItem(WEIGHT_KEY)) || {};
            quiz1History = JSON.parse(localStorage.getItem(HISTORY_KEY)) || [];
            wordSpecificHistory = JSON.parse(localStorage.getItem(WORD_SPECIFIC_HISTORY_KEY)) || {};
        } catch(e) {
            console.warn("無法使用 LocalStorage");
            wordWeights = {}; quiz1History = []; wordSpecificHistory = {};
        }

        if (typeof Papa === 'undefined') {
            filterArea.innerHTML = `<span style="color:var(--danger); font-size:18px;">❌ 嚴重錯誤：無法載入解析套件。</span>`;
            return;
        }

        try {
            const response = await fetch('words.csv', { cache: 'no-cache' });
            if (!response.ok) throw new Error(`找不到 words.csv`);
            const textData = await response.text();
            
            Papa.parse(textData.trim(), {
                header: true, skipEmptyLines: true,
                complete: function(results) { processParsedData(results.data, filterArea); },
                error: function(err) { throw new Error("CSV 解析失敗"); }
            });
        } catch (error) {
            filterArea.innerHTML = `<span style="color:var(--danger); font-size:16px;">❌ 讀取失敗: ${error.message}</span>`;
        }
    });

    function processParsedData(data, filterArea) {
        allWords = [];
        data.forEach(row => {
            if (typeof row !== 'object' || row === null) return;
            const keys = Object.keys(row);
            const keyLesson = keys.find(k => k.toLowerCase().includes('lesson'));
            const keyTitle = keys.find(k => k.toLowerCase().includes('title'));
            const keyWord = keys.find(k => k.toLowerCase().includes('word'));
            const keyTrans = keys.find(k => k.toLowerCase().includes('translation') || k.toLowerCase().includes('trans'));

            if (keyWord && keyTrans && row[keyWord] && row[keyTrans]) {
                allWords.push({
                    lesson: keyLesson && row[keyLesson] ? String(row[keyLesson]).trim() : '1',
                    title: keyTitle && row[keyTitle] ? String(row[keyTitle]).trim() : '未分類',
                    word: String(row[keyWord]).trim(),
                    translation: String(row[keyTrans]).trim(),
                    id: `${row[keyLesson]}_${row[keyWord]}`
                });
            }
        });

        if (allWords.length === 0) {
            filterArea.innerHTML = `<span style="color:var(--danger); font-size:16px;">❌ 找不到單字！</span>`; return;
        }

        initWeights(); renderFilters(filterArea); updateActivePool();
        document.getElementById('q1-start-btn').innerText = "開始 10 題測試"; document.getElementById('q1-start-btn').disabled = false;
        document.getElementById('q2-start-btn').innerText = "開始 10 題測試"; document.getElementById('q2-start-btn').disabled = false;
    }

    function initWeights() {
        allWords.forEach(w => { if (wordWeights[w.id] === undefined) wordWeights[w.id] = 10; });
        saveWeights();
    }
    
    function saveWeights() { try { localStorage.setItem(WEIGHT_KEY, JSON.stringify(wordWeights)); } catch(e) {} }
    function saveWordSpecificHistory() { try { localStorage.setItem(WORD_SPECIFIC_HISTORY_KEY, JSON.stringify(wordSpecificHistory)); } catch(e) {} }

    function getWordEvaluation(wordId) {
        const records = wordSpecificHistory[wordId] || [];
        const total = records.length;
        
        if (total < 3) {
            return { text: "待評比", bgColor: "#94a3b8", accuracy: null, total: total };
        }
        
        const correctCount = records.filter(r => r.isCorrect).length;
        const accuracy = Math.round((correctCount / total) * 100);
        
        if (accuracy <= 50) {
            return { text: "不大熟", bgColor: "var(--danger)", accuracy: accuracy, total: total };
        } else if (accuracy < 100) {
            return { text: "熟", bgColor: "var(--warning)", accuracy: accuracy, total: total };
        } else {
            return { text: "精通", bgColor: "var(--success)", accuracy: accuracy, total: total };
        }
    }

    function renderFilters(container) {
        const lessons = [];
        const seen = new Set();
        allWords.forEach(w => {
            const key = `${w.lesson}-${w.title}`;
            if (!seen.has(key)) { seen.add(key); lessons.push({ id: w.lesson, title: w.title }); }
        });
        lessons.sort((a, b) => (parseInt(a.id) || 0) - (parseInt(b.id) || 0));

        container.innerHTML = '';
        lessons.forEach((l, idx) => {
            const label = document.createElement('label'); label.className = 'checkbox-label';
            const checked = idx === 0 ? 'checked' : ''; 
            label.innerHTML = `<input type="checkbox" value="${l.id}" ${checked} onchange="updateActivePool()"> L${l.id} (${l.title})`;
            container.appendChild(label);
        });
    }

    function updateActivePool() {
        const checkedLessons = Array.from(document.querySelectorAll('#lesson-filters input:checked')).map(el => el.value);
        activePool = allWords.filter(w => checkedLessons.includes(w.lesson));
        renderWordList();
        document.getElementById('q1-start-screen').style.display = 'block'; document.getElementById('q1-play-screen').style.display = 'none'; document.getElementById('q1-result-screen').style.display = 'none';
        document.getElementById('q2-start-screen').style.display = 'block'; document.getElementById('q2-play-screen').style.display = 'none'; document.getElementById('q2-result-screen').style.display = 'none';
    }

    function renderWordList() {
        const tbody = document.getElementById('word-list-body');
        if (activePool.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;color:red;">請至少勾選一個單元範圍</td></tr>'; return;
        }
        tbody.innerHTML = activePool.map(w => {
            const evalObj = getWordEvaluation(w.id);
            const badgeHtml = `<span class="eval-badge" style="background-color: ${evalObj.bgColor};">${evalObj.text}</span>`;
            
            return `
            <tr>
                <td>L${w.lesson} - ${w.title}</td>
                <td style="font-weight:bold; font-size:18px;">${w.word}</td>
                <td>
                    <button class="btn-audio" onclick="speak('${w.word}', 0.9)" title="正常速度">🔊</button>
                    <button class="btn-audio" onclick="speak('${w.word}', 0.4)" title="慢速發音">🐢</button>
                </td>
                <td>${w.translation}</td>
                <td>${badgeHtml}</td>
                <td>
                    <button class="btn-nav" style="padding: 6px 12px; font-size: 14px; background: #8b5cf6;" onclick="openWordHistoryModal('${w.id}')">📊 查看</button>
                </td>
            </tr>
            `;
        }).join('');
    }

    function openWordHistoryModal(wordId) {
        const wordObj = allWords.find(w => w.id === wordId);
        if (!wordObj) return;

        document.getElementById('modal-word-title').innerText = `單字 [ ${wordObj.word} ]`;
        document.getElementById('modal-word-translation').innerText = `中文解釋：${wordObj.translation}`;
        
        const evalObj = getWordEvaluation(wordId);
        let evalHtml = `目前狀態：<span class="eval-badge" style="background-color: ${evalObj.bgColor}; margin-left: 5px;">${evalObj.text}</span>`;
        if (evalObj.accuracy !== null) {
            evalHtml += `<br><span style="font-size: 14px; color: #64748b;">總測驗次數：${evalObj.total} 次 / 正確率：${evalObj.accuracy}%</span>`;
        } else {
            evalHtml += `<br><span style="font-size: 14px; color: #64748b;">總測驗次數：${evalObj.total} 次 (需滿 3 次才能評比)</span>`;
        }
        document.getElementById('modal-word-evaluation').innerHTML = evalHtml;
        
        const historyList = document.getElementById('modal-word-list');
        const records = wordSpecificHistory[wordId] || [];

        if (records.length === 0) {
            historyList.innerHTML = '<li style="text-align:center; color:#94a3b8; padding: 20px 0;">尚無任何中翻英測試紀錄。</li>';
        } else {
            let html = '';
            records.slice().reverse().forEach(record => {
                const icon = record.isCorrect ? '⭕' : '❌';
                const color = record.isCorrect ? 'var(--success)' : 'var(--danger)';
                html += `
                    <li class="word-history-item">
                        <div style="display:flex; justify-content:space-between; margin-bottom:4px;">
                            <span>${icon} 測試時間：${record.date}</span>
                        </div>
                        ${!record.isCorrect ? `<div style="color:${color}; font-size:13px; margin-left:24px;">您的作答: <strong>${record.userAnswer || '(未填寫)'}</strong></div>` : ''}
                    </li>`;
            });
            historyList.innerHTML = html;
        }

        document.getElementById('modal-word-reset-btn').onclick = function() {
            if (confirm(`確定要清空 [ ${wordObj.word} ] 的專屬測試紀錄嗎？`)) {
                delete wordSpecificHistory[wordId];
                saveWordSpecificHistory();
                openWordHistoryModal(wordId); 
                renderWordList(); 
            }
        };

        document.getElementById('word-history-modal').style.display = 'flex';
    }

    function closeWordHistoryModal() { document.getElementById('word-history-modal').style.display = 'none'; }

    function speak(text, rate = 0.9) {
        if ('speechSynthesis' in window) {
            window.speechSynthesis.cancel();
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'en-US'; utterance.rate = rate; 
            window.speechSynthesis.speak(utterance);
        }
    }

    function getRandomWordByWeight() {
        if (activePool.length === 0) return null;
        let totalWeight = 0; activePool.forEach(w => { totalWeight += (wordWeights[w.id] || 10); });
        let randomNum = Math.random() * totalWeight;
        for (let i = 0; i < activePool.length; i++) {
            const w = activePool[i]; const weight = wordWeights[w.id] || 10;
            if (randomNum < weight) return w; randomNum -= weight;
        }
        return activePool[activePool.length - 1];
    }

    function startSession(mode) {
        if (activePool.length === 0) return;
        currentSession.mode = mode; currentSession.currentIndex = 0; currentSession.questions = [];
        currentSession.userAnswers = new Array(10).fill(""); currentSession.optionsData = [];

        for (let i = 0; i < 10; i++) {
            let picked = getRandomWordByWeight(); currentSession.questions.push(picked);
            if (mode === 2) {
                let opts = [picked.translation];
                let wrongPool = allWords.filter(w => w.translation !== picked.translation).map(w => w.translation);
                wrongPool = [...new Set(wrongPool)].sort(() => Math.random() - 0.5);
                for(let j=0; j<3; j++) { if(wrongPool[j]) opts.push(wrongPool[j]); }
                opts.sort(() => Math.random() - 0.5); currentSession.optionsData.push(opts);
            }
        }
        document.getElementById(`q${mode}-start-screen`).style.display = 'none'; document.getElementById(`q${mode}-result-screen`).style.display = 'none'; document.getElementById(`q${mode}-play-screen`).style.display = 'block'; showQuestion(mode);
    }

    function showQuestion(mode) {
        const idx = currentSession.currentIndex; const wordObj = currentSession.questions[idx];
        document.getElementById(`q${mode}-progress`).innerText = `第 ${idx + 1} / 10 題`;
        document.getElementById(`q${mode}-stats`).innerText = `目前此字權重：${wordWeights[wordObj.id]} 籤`;
        document.getElementById(`q${mode}-prev`).disabled = (idx === 0);
        
        const finishBtn = document.getElementById(`q${mode}-finish`);
        if (idx === 9) {
            document.getElementById(`q${mode}-next`).style.display = 'none'; if(finishBtn) finishBtn.style.display = 'inline-block';
        } else {
            document.getElementById(`q${mode}-next`).style.display = 'inline-block'; if(finishBtn) finishBtn.style.display = 'none';
        }

        if (mode === 1) {
            document.getElementById('q1-question').innerText = `請寫出英文：「 ${wordObj.translation} 」`;
            const inputField = document.getElementById('q1-input'); inputField.value = currentSession.userAnswers[idx]; 
            document.getElementById('q1-feedback').innerText = currentSession.userAnswers[idx] ? "💡 本題已暫存答案" : "";
            inputField.focus();
        } else {
            document.getElementById('q2-question').innerText = wordObj.word;
            const options = currentSession.optionsData[idx]; const savedAns = currentSession.userAnswers[idx];
            const optionsContainer = document.getElementById('q2-options');
            optionsContainer.innerHTML = options.map(opt => {
                let style = savedAns === opt ? "background-color: var(--primary); color: white;" : "";
                return `<button class="option-btn" style="${style}" onclick="saveAnswer2('${opt}', this)">${opt}</button>`;
            }).join('');
            document.getElementById('q2-feedback').innerText = savedAns ? "💡 本題已選擇答案" : "";
        }
    }

    function saveAnswer1() {
        const idx = currentSession.currentIndex; currentSession.userAnswers[idx] = document.getElementById('q1-input').value.trim();
        document.getElementById('q1-feedback').innerText = "已暫存答案！";
        if (idx < 9) setTimeout(() => { nextQuestion(1); }, 400);
    }

    function saveAnswer2(selectedOpt, btnElement) {
        const idx = currentSession.currentIndex; currentSession.userAnswers[idx] = selectedOpt;
        document.querySelectorAll('#q2-options .option-btn').forEach(btn => btn.setAttribute('style', ''));
        btnElement.style.backgroundColor = "var(--primary)"; btnElement.style.color = "white";
        document.getElementById('q2-feedback').innerText = "已選取！";
        if (idx < 9) setTimeout(() => { nextQuestion(2); }, 400);
    }

    function nextQuestion(mode) {
        if (currentSession.currentIndex < 9) {
            if(mode === 1) currentSession.userAnswers[currentSession.currentIndex] = document.getElementById('q1-input').value.trim();
            currentSession.currentIndex++; showQuestion(mode);
        }
    }
    function prevQuestion(mode) {
        if (currentSession.currentIndex > 0) {
            if(mode === 1) currentSession.userAnswers[currentSession.currentIndex] = document.getElementById('q1-input').value.trim();
            currentSession.currentIndex--; showQuestion(mode);
        }
    }

    function finishSession(mode) {
        if(mode === 1) currentSession.userAnswers[currentSession.currentIndex] = document.getElementById('q1-input').value.trim();
        let correctCount = 0;
        let reportHtml = `<h2>🎯 測試結果報告</h2><p>您在 10 題中答對了 <strong style="color:var(--success); font-size:24px;">{{SCORE}}</strong> 題！</p><div class="report-box">`;

        let sessionRecord = null;
        const testDateString = new Date().toLocaleString('zh-TW'); 

        if (mode === 1) {
            sessionRecord = { date: testDateString, details: [] };
        }

        currentSession.questions.forEach((wordObj, i) => {
            const userAns = currentSession.userAnswers[i].toLowerCase();
            let isCorrect = mode === 1 ? (userAns === wordObj.word.toLowerCase()) : (currentSession.userAnswers[i] === wordObj.translation);
            const currentWeight = wordWeights[wordObj.id] || 10;
            
            if (mode === 1) {
                sessionRecord.details.push({
                    word: wordObj.word, translation: wordObj.translation,
                    userAnswer: currentSession.userAnswers[i] || '', isCorrect: isCorrect
                });

                if (!wordSpecificHistory[wordObj.id]) wordSpecificHistory[wordObj.id] = [];
                wordSpecificHistory[wordObj.id].push({
                    date: testDateString, isCorrect: isCorrect, userAnswer: currentSession.userAnswers[i] || ''
                });
            }

            if (isCorrect) {
                correctCount++; wordWeights[wordObj.id] = Math.max(1, currentWeight - 2);
                reportHtml += `<div class="report-item"><span>⭕ <strong>${wordObj.word}</strong></span><span style="color:var(--success)">${wordObj.translation}</span></div>`;
            } else {
                wordWeights[wordObj.id] = Math.min(40, currentWeight + 5);
                const correctTxt = mode === 1 ? wordObj.word : wordObj.translation;
                reportHtml += `<div class="report-item"><span>❌ <strong>${wordObj.word}</strong></span><span style="color:var(--danger)">您的答案: ${currentSession.userAnswers[i]||'空'} → 正確: ${correctTxt}</span></div>`;
            }
        });

        if (mode === 1) {
            sessionRecord.score = correctCount;
            quiz1History.unshift(sessionRecord);
            if (quiz1History.length > 100) quiz1History.length = 100;
            try { localStorage.setItem(HISTORY_KEY, JSON.stringify(quiz1History)); } catch(e) {}
            
            saveWordSpecificHistory();

            if (document.getElementById('q1-history-screen').style.display !== 'none') renderHistory1();
        }

        reportHtml += `</div><br><button class="btn-submit" onclick="restartMode(${mode})">再測一組 10 題</button>`;
        saveWeights(); renderWordList(); 
        document.getElementById(`q${mode}-play-screen`).style.display = 'none';
        const resScr = document.getElementById(`q${mode}-result-screen`);
        resScr.innerHTML = reportHtml.replace("{{SCORE}}", correctCount); resScr.style.display = 'block';
    }

    function toggleHistory1() {
        const screen = document.getElementById('q1-history-screen');
        if (screen.style.display === 'none') { renderHistory1(); screen.style.display = 'block'; } else { screen.style.display = 'none'; }
    }

    function renderHistory1() {
        const container = document.getElementById('q1-history-content');
        if (quiz1History.length === 0) { container.innerHTML = '<p style="color: #64748b;">目前沒有任何中翻英的測試紀錄。</p>'; return; }
        let html = '';
        quiz1History.forEach((session, index) => {
            html += `<div class="history-session"><div class="history-header">🕒 測驗時間: ${session.date} <span style="float: right;">答對: <strong style="color:var(--success)">${session.score}</strong> / 10</span></div><div>`;
            session.details.forEach(detail => {
                const icon = detail.isCorrect ? '⭕' : '❌';
                const color = detail.isCorrect ? 'var(--success)' : 'var(--danger)';
                html += `<div class="history-detail">${icon} ${detail.translation} (${detail.word})<br><span style="color:${color}; font-size:12px; margin-left: 20px;">您的作答: ${detail.userAnswer || '(未填寫)'}</span></div>`;
            });
            html += `</div></div>`;
        });
        container.innerHTML = html;
    }

    function clearHistory1() {
        if (confirm("⚠️ 警告：確定要刪除「所有中翻英」的整張考卷紀錄嗎？\n(這不會影響單字權重與個別單字紀錄)")) {
            quiz1History = [];
            try { localStorage.removeItem(HISTORY_KEY); } catch(e) {}
            renderHistory1(); alert("全卷歷史紀錄已完全清空！");
        }
    }

    function restartMode(mode) { document.getElementById(`q${mode}-result-screen`).style.display = 'none'; document.getElementById(`q${mode}-start-screen`).style.display = 'block'; startSession(mode); }
    function switchTab(tabId) { document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active')); document.querySelectorAll('.panel').forEach(panel => panel.classList.remove('active')); document.getElementById('btn-' + tabId).classList.add('active'); document.getElementById(tabId).classList.add('active'); }
</script>
</body>
</html>
